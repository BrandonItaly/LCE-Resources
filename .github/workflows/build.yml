name: Build and Optimize

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Optimize Assets
        run: |
          sudo apt-get update && sudo apt-get install -y oxipng ffmpeg jq bc

          PRE_SIZE=$(du -sb resources | cut -f1)

          # 1. Optimize PNGs
          find resources -name "*.png" -exec oxipng -o 2 --strip all {} +

          # 2. Optimize Audio
          find resources -name "*.ogg" -exec ffmpeg -i {} -map_metadata -1 -acodec libvorbis -qscale:a 5 -y {}.tmp.ogg \; -exec mv {}.tmp.ogg {} \;

          # 3. Minify JSON
          find resources -name "*.json" -exec sh -c 'jq -c . "{}" > "{}.tmp" && mv "{}.tmp" "{}"' \;

          POST_SIZE=$(du -sb resources | cut -f1)
          SAVED=$((PRE_SIZE - POST_SIZE))
          SAVED_MB=$(echo "scale=2; $SAVED / 1048576" | bc)
          
          echo "### 📦 Build Optimization Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Original | $((PRE_SIZE / 1024)) KB |" >> $GITHUB_STEP_SUMMARY
          echo "| Optimized | $((POST_SIZE / 1024)) KB |" >> $GITHUB_STEP_SUMMARY
          echo "| **Saved** | **${SAVED_MB} MB** |" >> $GITHUB_STEP_SUMMARY

      - name: Create Resource Pack Zip
        run: |
          cd resources
          # Using a generic name for the build artifact
          zip -r "../Optimized-ResourcePack.zip" .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Optimized-Resource-Pack
          path: Optimized-ResourcePack.zip
          retention-days: 7